# Bellerophon Go config — see docs/M001-CONTEXT.md §2 for the full field
# table (Go field ↔ YAML key ↔ env var ↔ CLI flag).
#
# Required: sip.{domain,registrar,extension,auth_password}, rtp.external_ip.
# Everything else has a sensible default.

sip:
  domain: "sip.example.local"          # SIP_DOMAIN
  registrar: "10.0.0.50"               # SIP_REGISTRAR
  registrar_port: 5060                 # SIP_REGISTRAR_PORT (default 5060)
  extension: "1001"                    # SIP_EXTENSION
  auth_username: ""                    # SIP_AUTH_USERNAME (defaults to extension)
  auth_id: ""                          # SIP_AUTH_ID
  auth_password: "change-me"           # SIP_PASSWORD
  expiry: 300                          # SIP_EXPIRY (seconds)

rtp:
  external_ip: "10.0.0.100"            # EXTERNAL_IP — must reach the caller's RTP
  port_range: "30000-30100"            # RTP_PORT_RANGE — avoid 3CX SBC's 20000-20099

http:
  port: 3000                           # HTTP_PORT (0 disables admin HTTP)
  tls_port: 0                          # TLS_PORT (0 disables HTTPS)
  tls_cert: ""                         # TLS_CERT_FILE — required iff tls_port > 0
  tls_key: ""                          # TLS_KEY_FILE  — required iff tls_port > 0

logging:
  level: "info"                        # LOG_LEVEL (debug|info|warn|error)
  format: "text"                       # LOG_FORMAT (text|json)
